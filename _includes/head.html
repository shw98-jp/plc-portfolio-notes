<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  {%- seo -%}

  {%- assign cache_bust = site.time | date: "%s" -%}

  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}?v={{ cache_bust }}">
  {%- feed_meta -%}

  <script>
    (function () {
      var version = "{{ cache_bust }}";
      var key = "plc-portfolio-version";
      try {
        var previous = window.localStorage.getItem(key);
        if (previous && previous !== version && !window.location.search.match(/[?&]v=/)) {
          window.localStorage.setItem(key, version);
          var separator = window.location.search ? "&" : "?";
          window.location.replace(window.location.href + separator + "v=" + version);
          return;
        }
        window.localStorage.setItem(key, version);
      } catch (error) {
        // localStorage may be unavailable in private browsing.
      }
    })();
  </script>

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
</head>
